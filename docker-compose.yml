version: '3.8'

services:
  zimage-api:
    build: .
    container_name: zimage-api
    ports:
      - "8000:8000"
      - "6080:6080"
    environment:
      - API_KEY=${API_KEY:-your-secret-api-key}
      - PORT=8000
      - HOST=0.0.0.0
      - HEADLESS=true
      - COOKIE_FILE=/app/data/cookies.json
      - STATE_FILE=/app/data/storage-state.json
      - HANDOFF_ENABLED=true
      - NOVNC_BASE_URL=${NOVNC_BASE_URL:-http://localhost:6080/vnc.html?autoconnect=true&resize=remote}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    restart: unless-stopped
